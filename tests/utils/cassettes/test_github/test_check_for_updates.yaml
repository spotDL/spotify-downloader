        `extractor_args` being list instead of dict (#2435)\\n\\n# Title\\nSee #2432.\\n\\n##
        Description\\nA commit (ad48f5c) 7 months ago set `extractor_args` (yt-dlp
        parameter)\\nto `[]`, when it should be a dictionary. I assume this just recently
        got\\ninto a release, since a few people have been complaining about issues\\ncaused
        by this.\\n\\nThis PR reverts the problematic commit, leaving `extractor_args`
        to\\ndefault to `{}`.\\n\\n## Related Issue\\n#2432\\n\\n## Motivation and
        Context\\nIt allows users to use spotdl with youtube.\\n\\n## How Has This
        Been Tested?\\n```sh\\n$ uv sync\\n...\\n$ uv run scripts/build.py\\n...\\n$
        dist/spotdl-4.3.0-linux download 'primus too many puppies'\\n... (it worked)\\n```\\n\\n##
        Types of Changes\\n- [x] Bug fix (non-breaking change which fixes an issue)\\n-
        [ ] New feature (non-breaking change which adds functionality)\\n- [ ] Breaking
        change (fix or feature that would cause existing\\nfunctionality to change)\\n\\n##
