        Invalid directory creation when downloading from YouTube Music. (#2431)\\n\\n\\n\\n#
        Title\\n<!--- Provide a general summary of your changes in the Title above
        -->\\nFixes Invalid directory creation when downloading from YouTube Music.\\n##
        Description\\n<!--- Describe your changes in detail -->\\nResolves an issue
        where downloading songs from a YT music playlist would\\nresult in them being
        saved to a None/None directory. The root cause was\\nthat the directory was
        being generated before the songs' metadata was\\nfully fetched from YT music.
        album_artist and album_name were None when\\nthe directory was created, leading
        to an invalid directory structure,\\nand any M3U created after to not point
        to the correct directories. The\\nfix was entirely in downloader.py.\\n\\n##
        Related Issue\\n<!--- This project only accepts pull requests related to open
        issues -->\\n<!--- If suggesting a new feature or change, please discuss it
        in an\\nissue first -->\\n<!--- If fixing a bug, there should be an issue
        describing it with steps\\nto reproduce -->\\n<!--- Please link to the issue
        here: --> Fixes #2286 \\n\\n## Motivation and Context\\n<!--- Why is this
        change required? What problem does it solve? -->\\nThis change is required
        to ensure that playlists downloaded from YouTube\\nMusic are saved in the
        correct directory structure, specified by the\\nuser's output format. It fixes
        a significant bug that affected the core\\nuse of the tool and prevented further
        problems, such as breaking M3U\\nlinks.\\n## How Has This Been Tested?\\n<!---
        Please describe in detail how you tested your changes. -->\\n<!--- Include
        details of your testing environment, and the tests you ran\\nto -->\\n<!---
        see how your change affects other areas of the code, etc. -->\\n1. Manual
        verification: used the same command from #2286 that was\\nfailing (with a
        different playlist as the playlist in the issue doesn't\\nexist anymore).
        The command succeeded after my changes and created the\\ncorrect directory
        structure ({album-artist}/{album}).\\n2. Automated testing: Ran the full Pytest
        suite on both my modified\\nrepository and a clean clone of the repository
        on the master branch. The\\ntest results were identical, with the same tests
        failing and passing\\nbetween both repositories. So, my changes have not caused
        any new\\nerrors.\\n## Screenshots (if appropriate)\\nN/A\\n## Types of Changes\\n<!---
