        yt-dlp Extractor Argument Support (#2285)\\n\\n# Add yt-dlp Extractor Argument
        Support\\nAdds `yt-dlp` extractor argument support\\n\\n## Description\\nYoutube
        has recently made it impossible to use yt-dlp without accessing\\nvia PO Tokens.
        yt-dlp supports that, but you need to be able to provide\\nthe `extractor_args`
        parameter to the API (or `--yt-dlp-args` to the\\nCLI).\\n\\nThis PR enables
        that in the Spotdl API since if you were to supply it\\ncurrently it would
        fail.\\n\\n** Note\\nThis indirectly adds support for the CLI usage of this
        app directly as\\nwell.\\n\\nExample can be seen here:\\n```\\nspotdl --cookie-file
        /config/cookies.txt --yt-dlp-args \\\"--extractor-args \\\\\\\"youtube:player_client=web_music,default;po_token=web_music+<po_token>\\\\\\\"\\\"
        <youtube_music_url>\\n```\\n\\n## Related Issue\\nPartially fixes https://github.com/spotDL/spotify-downloader/issues/2279\",\"tree\":{\"sha\":\"924c0be5aa65ea8b30efc37f84e944ad3dd24535\",\"url\":\"https://api.github.com/repos/spotDL/spotify-downloader/git/trees/924c0be5aa65ea8b30efc37f84e944ad3dd24535\"},\"url\":\"https://api.github.com/repos/spotDL/spotify-downloader/git/commits/5e9ab8aba95b76353a6d51caa0dc5e9826f4aa73\",\"comment_count\":0,\"verification\":{\"verified\":true,\"reason\":\"valid\",\"signature\":\"-----BEGIN
