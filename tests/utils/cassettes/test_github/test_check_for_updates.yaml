        width=\\\"200\\\" />\\n+<div align=\\\"center\\\">\\n \\n-# spotDL\\n+# spotDL
        v4\\n \\n-Download your Spotify playlists and songs along with album art and
        metadata\\n+**spotDL** finds songs from Spotify playlists on YouTube and downloads
        them - along with album art, lyrics and metadata.\\n \\n-[![MIT License](https://img.shields.io/apm/l/atomic-design-ui.svg?style=flat-square&color=44CC11)](https://github.com/spotDL/spotify-downloader/blob/master/LICENSE)\\n-[![pypi
