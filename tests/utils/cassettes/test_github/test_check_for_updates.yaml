        \\n+> spotDL: The fastest, easiest and most accurate command-line music downloader.\\n
        </div>\\n \\n-> The fastest, easiest, and most accurate command-line music
        downloader\\n-\\n-[![asciicast](https://asciinema.org/a/wDNFL5XGhdadUK2EnOkv46YMG.svg)](https://asciinema.org/a/wDNFL5XGhdadUK2EnOkv46YMG)\\n-\\n-##
        What spotDL does\\n-\\n-1. Downloads music from YouTube as an MP3 file\\n-2.
        Applies basic metadata gathered from Spotify such as:\\n-    - Track Name\\n-
        \   - Track Number\\n-    - Album\\n-    - Album Cover\\n-    - Genre\\n-
        \   - and more!\\n-\\n-### Redesigned\\n-\\n-spotDL is being redesigned! This
        means we are currently not accepting new feature requests. You can talk to
        us on [our Discord](https://discord.gg/xCa23pwJWY) if there is anything further.\\n-\\n-##
        Prerequisites\\n-\\n-- Python 3.6.1 or above (added to PATH)\\n-- FFmpeg 4.2
        or above (added to PATH)\\n-\\n-> **_YouTube Music must be available in your
        country for spotDL to work. This is because we use YouTube Music to filter
        search results. You can check if YouTube Music is available in your country,
        by visiting [YouTube Music](https://music.youtube.com)._**\\n+______________________________________________________________________\\n+**[Read
        the documentation on ReadTheDocs!](https://spotdl.readthedocs.io)**\\n+______________________________________________________________________\\n
        \\n ## Installation\\n \\n-### Installing FFmpeg\\n-\\n-- [Windows Tutorial](https://windowsloop.com/install-ffmpeg-windows-10/)\\n--
        OSX - `brew install ffmpeg`\\n-- Linux - `sudo apt install ffmpeg`\\n-\\n-###
        Installing spotDL\\n-\\n-- Recommended Stable Version:\\n-\\n-    ```bash\\n-
        \   pip install spotdl\\n-    ```\\n-\\n-- Dev Version: **(NOT STABLE)**\\n-\\n-
        \   ```bash\\n-    pip install https://codeload.github.com/spotDL/spotify-downloader/zip/dev\\n-
        \   ```\\n-\\n-If you have trouble installing spotdl take a look at the extended
        installation guide\\n-[here](/docs/INSTALLATION.md) or ask for help in our\\n-[discord
        server](https://discord.gg/xCa23pwJWY)\\n-\\n-#### On Termux\\n-\\n-```bash\\n-curl
        -L https://raw.githubusercontent.com/spotDL/spotify-downloader/master/termux/setup_spotdl.sh
        | sh\\n-```\\n-\\n-#### Arch\\n-\\n-There is an Arch User Repository (AUR)
        package for [spotDL](https://aur.archlinux.org/packages/python-spotdl/).\\n-\\n-##
        Usage\\n-\\n-- #### To download a song, run\\n-\\n-    ```bash\\n-    spotdl
        [trackUrl]\\n-    ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-    spotdl
        https://open.spotify.com/track/0VjIjW4GlUZAMYd2vXMi3b\\n-    ```\\n-\\n--
        #### To download an album, run\\n-\\n-    ```bash\\n-    spotdl [albumUrl]\\n-
        \   ```\\n+Refer to our [Installation Guide](docs/installation.md) for more
        details.\\n \\n-    example:\\n+### Python (Recommended Method)\\n \\n-    ```bash\\n-
        \   spotdl https://open.spotify.com/album/4yP0hdKOZPNshxUOjY0cZj\\n-    ```\\n+-
        _spotDL_ can be installed by running `pip install spotdl`.\\n+- To update
        spotDL run `pip install --upgrade spotdl`\\n \\n-- #### To download a playlist,
        run\\n+  > On some systems you might have to change `pip` to `pip3`.\\n \\n-
        \   ```bash\\n-    spotdl [playlistUrl]\\n-    ```\\n+<details>\\n+    <summary
        style=\\\"font-size:1.25em\\\"><strong>Other options</strong></summary>\\n
        \\n-    example:\\n+- Prebuilt executable\\n+  - You can download the latest
        version from the\\n+    [Releases Tab](https://github.com/spotDL/spotify-downloader/releases)\\n+-
        On Termux\\n+  - `curl -L https://raw.githubusercontent.com/spotDL/spotify-downloader/master/scripts/termux.sh
        | sh`\\n+- Arch\\n+  - There is an [Arch User Repository (AUR) package](https://aur.archlinux.org/packages/spotdl/)
        for\\n+    spotDL.\\n+- Docker\\n+  - Build image:\\n \\n     ```bash\\n-
        \   spotdl https://open.spotify.com/playlist/37i9dQZF1E8UXBoz02kGID\\n+    docker
        build -t spotdl .\\n     ```\\n \\n-- #### To download all songs from an artist
        run\\n+  - Launch container with spotDL parameters (see section below). You
        need to create mapped\\n+    volume to access song files\\n \\n     ```bash\\n-
        \   spotdl [artistUrl]\\n+    docker run --rm -v $(pwd):/music spotdl download
        [trackUrl]\\n     ```\\n \\n-    example:\\n+  - Build from source\\n \\n
        \    ```bash\\n-    spotdl https://open.spotify.com/artist/1fZAAHNWdSM5gqbi9o5iEA\\n+
        \   git clone https://github.com/spotDL/spotify-downloader && cd spotify-downloader\\n+
        \   pip install uv\\n+    uv sync\\n+    uv run scripts/build.py\\n     ```\\n
        \\n-- #### To search for and download a song, run, **with quotation marks**\\n+
        \   An executable is created in `spotify-downloader/dist/`.\\n \\n-    ```bash\\n-
        \   spotdl '[songQuery]'\\n-    ```\\n-\\n-    example:\\n+</details>\\n \\n-
        \   ```bash\\n-    spotdl 'The Weeknd - Blinding Lights'\\n-    ```\\n-\\n-
        \   > _Note: This is not accurate and often causes errors._\\n-\\n-- ####
        To resume a failed/incomplete download, run\\n-\\n-    ```bash\\n-    spotdl
        [pathToTrackingFile]\\n-    ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-
        \   spotdl 'The Weeknd - Blinding Lights.spotdlTrackingFile'\\n-    ```\\n-\\n-
        \   > _Note: `.spotdlTrackingFile`s are automatically created when a download
        starts and deleted on completion_\\n-\\n-- #### You can queue up multiple
        download tasks by separating the arguments with spaces\\n-\\n-    ```bash\\n-
        \   spotdl [songQuery1] [albumUrl] [songQuery2] ... (order does not matter)\\n-
        \   ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-    spotdl 'The Weeknd -
        Blinding Lights' https://open.spotify.com/playlist/37i9dQZF1E8UXBoz02kGID
        ...\\n-    ```\\n-\\n-    > _Note: spotDL downloads up to 4 songs in parallel,
        so for a faster experience, download albums and playlist, rather than tracks._\\n-\\n--
        #### To download youtube video with metadata from spotify, run\\n-\\n-    ```bash\\n-
        \   spotdl \\\"YouTubeURL|SpotifyURL\\\"\\n-    ```\\n-\\n-    example:\\n-\\n-
        \   ```bash\\n-    spotdl \\\"https://www.youtube.com/watch?v=EO7XnC1YpVo|https://open.spotify.com/track/4fzsfWzRhPawzqhX8Qt9F3\\\"\\n-
        \   ```\\n-\\n-    > Note: Urls have to be separated with `|` and quoted properly
        ex. \\\"YouTubeURL|SpotifyUrl\\\"\\n-\\n-- #### To download songs with different
        output format run\\n-\\n-    ```bash\\n-    spotdl [songUrl] --output-format
        mp3/m4a/flac/opus/ogg/wav\\n-    ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-
        \   spotdl [songUrl] --output-format opus\\n-    ```\\n-\\n-- #### To use
        ffmpeg binary that is not on PATH run\\n-\\n-    ```bash\\n-    spotdl [songUrl]
        --ffmpeg path/to/your/ffmpeg.exe\\n-    ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-
        \   spotdl [songUrl] --ffmpeg C:\\\\ffmpeg\\\\bin\\\\ffmpeg.exe\\n-    ```\\n-\\n--
        #### To generate .m3u file for each playlist run\\n-\\n-    ```bash\\n-    spotdl
        [playlistUrl] --m3u\\n-    ```\\n-\\n-    example:\\n-\\n-    ```bash\\n-
        \     spotdl https://open.spotify.com/playlist/37i9dQZF1E8UXBoz02kGID --m3u\\n-
        \   ```\\n+### Installing FFmpeg\\n \\n-- #### To use youtube instead of youtube
        music run\\n+FFmpeg is required for spotDL. If using FFmpeg only for spotDL,
        you can simply install FFmpeg to your spotDL installation directory:\\n+`spotdl
        --download-ffmpeg`\\n \\n-    ```bash\\n-    spotdl [songUrl] --use-youtube\\n-
        \   ```\\n+We recommend the above option, but if you want to install FFmpeg
        system-wide,\\n+follow these instructions\\n \\n-    example:\\n-\\n-    ```bash\\n-
        \     spotdl https://open.spotify.com/track/4fzsfWzRhPawzqhX8Qt9F3 --use-youtube\\n-
        \   ```\\n+- [Windows Tutorial](https://windowsloop.com/install-ffmpeg-windows-10/)\\n+-
        OSX - `brew install ffmpeg`\\n+- Linux - `sudo apt install ffmpeg` or use
        your distro's package manager\\n \\n-- #### To manually choose a lyrics provider,
        run\\n-  \\n-    ```bash\\n-      spotdl [songUrl] --lyrics-provider lyrics_provider\\n-
        \   ```\\n+## Usage\\n \\n-    available lyrics providers:\\n-    - genius\\n-
        \   - musixmatch\\n+Using SpotDL without options:\\n \\n-    example:\\n+```sh\\n+spotdl
        [urls]\\n+```\\n \\n-    ```bash\\n-      spotdl https://open.spotify.com/track/4fzsfWzRhPawzqhX8Qt9F3
        --lyrics-provider genius\\n-    ```\\n+You can run _spotDL_ as a package if
        running it as a script doesn't work:\\n \\n-- #### To change number of threads
        used when downloading songs run\\n+```sh\\n+python -m spotdl [urls]\\n+```\\n
        \\n-    ```bash\\n-    spotdl [songUrl] --dt [number]\\n-    ```\\n+General
        usage:\\n \\n-    example:\\n+```sh\\n+spotdl [operation] [options] QUERY\\n+```\\n
        \\n-    ```bash\\n-    spotdl https://open.spotify.com/track/4fzsfWzRhPawzqhX8Qt9F3
        --dt 8\\n-    ```\\n+There are different **operations** spotDL can perform.
        The _default_ is `download`, which simply downloads the songs from YouTube
        and embeds metadata.\\n \\n-- #### To change number of threads used when searching
        for songs run\\n+The **query** for spotDL is usually a list of Spotify URLs,
        but for some operations like **sync**, only a single link or file is required.\\n+For
        a list of all **options** use ```spotdl -h```\\n \\n-    ```bash\\n-    spotdl
        [songUrl] --st [number]\\n-    ```\\n+<details>\\n+<summary style=\\\"font-size:1em\\\"><strong>Supported
        operations</strong></summary>\\n \\n-    example:\\n+- `save`: Saves only
        the metadata from Spotify without downloading anything.\\n+    - Usage:\\n+
        \       `spotdl save [query] --save-file {filename}.spotdl`\\n \\n-    ```bash\\n-
        \   spotdl https://open.spotify.com/track/4fzsfWzRhPawzqhX8Qt9F3 --st 8\\n-
        \   ```\\n+- `web`: Starts a web interface instead of using the command line.
        However, it has limited features and only supports downloading single songs.\\n
        \\n-- #### To ignore your ffmpeg version run\\n+- `url`: Get direct download
        link for each song from the query.\\n+    - Usage:\\n+        `spotdl url
        [query]`\\n \\n-    ```bash\\n-    spotdl [songUrl] --ignore-ffmpeg-version\\n-
        \   ```\\n+- `sync`: Updates directories. Compares the directory with the
        current state of the playlist. Newly added songs will be downloaded and removed
        songs will be deleted. No other songs will be downloaded and no other files
        will be deleted.\\n \\n-- #### To use path template\\n+    - Usage:\\n+        `spotdl
        sync [query] --save-file {filename}.spotdl`\\n \\n-    ```bash\\n-    spotdl
        [songUrl] --path-template 'template'\\n-    ```\\n+        This create a new
        **sync** file, to update the directory in the future, use:\\n \\n-    example:\\n+
        \       `spotdl sync {filename}.spotdl`\\n \\n-    ```bash\\n-    spotdl https://open.spotify.com/track/0VjIjW4GlUZAMYd2vXMi3b
        --path-template '{artist}/{album}/{title} - {artist}.{ext}'\\n-    ```\\n+-
        `meta`: Updates metadata for the provided song files.\\n \\n-    possible
        values:\\n-    - {artist}\\n-    - {artists}\\n-    - {title}\\n-    - {album}\\n-
        \   - {ext}\\n-    - {playlist}\\n+</details>\\n \\n-## `pipx` Isolated Environment
        Alternative\\n+## Music Sourcing and Audio Quality\\n \\n-For users who are
        not familiar with `pipx`, it can be used to run scripts **without**\\n-installing
        the spotDL package and all the dependencies globally with pip. (Effectively\\n-skipping
        over the [spotDL Installation](#Installing-spotDL) step)\\n+spotDL uses YouTube
        as a source for music downloads. This method is used to avoid any issues related
        to downloading music from Spotify.\\n \\n-First, you will need to install
        `pipx` by running:\\n+> **Note**\\n+> Users are responsible for their actions
        and potential legal consequences. We do not support unauthorized downloading
        of copyrighted material and take no responsibility for user actions.\\n \\n-```bash\\n-python3
        -m pip install --user pipx\\n-python3 -m pipx ensurepath\\n-```\\n+### Audio
        Quality\\n \\n-Next, you can jump directly to running spotDL with:\\n+spotDL
        downloads music from YouTube and is designed to always download the highest
        possible bitrate; which is 128 kbps for regular users and 256 kbps for YouTube
        Music premium users.\\n \\n-```bash\\n-pipx run spotdl ...\\n-```\\n+Check
        the [Audio Formats](docs/usage.md#audio-formats-and-quality) page for more
        info.\\n \\n-## Contributor Guide\\n+## Contributing\\n \\n Interested in
