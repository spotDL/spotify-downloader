        \ # type: ignore # pylint: disable=E1101\\n+\\n+        if args:\\n+            kwargs.update(args)\\n+\\n+
        \       cache_key = None\\n+        if use_cache:\\n+            key_obj =
        dict(kwargs)\\n+            key_obj[\\\"url\\\"] = url\\n+            key_obj[\\\"data\\\"]
        = json.dumps(payload)\\n+            cache_key = json.dumps(key_obj)\\n+            if
        cache_key is None:\\n+                cache_key = url\\n+            if self.cache.get(cache_key)
        is not None:\\n+                return self.cache[cache_key]\\n+\\n+        #
        Wrap in a try-except and retry up to `retries` times.\\n+        response
        = None\\n+        retries = self.max_retries  # type: ignore # pylint: disable=E1101\\n+
        \       while response is None:\\n+            try:\\n+                response
        = self._internal_call(\\\"GET\\\", url, payload, kwargs)\\n+            except
        (requests.exceptions.Timeout, requests.ConnectionError) as exc:\\n+                retries
        -= 1\\n+                if retries <= 0:\\n+                    raise exc\\n+\\n+
        \       if use_cache and cache_key is not None:\\n+            self.cache[cache_key]
        = response\\n+\\n+        return response\\n+\\n+\\n+def save_spotify_cache(cache:
        Dict[str, Optional[Dict]]):\\n+    \\\"\\\"\\\"\\n+    Saves the Spotify cache
        to a file.\\n+\\n+    ### Arguments\\n+    - cache: The cache to save.\\n+
        \   \\\"\\\"\\\"\\n+\\n+    cache_file_loc = get_spotify_cache_path()\\n+\\n+
        \   logger.debug(\\\"Saving Spotify cache to %s\\\", cache_file_loc)\\n+\\n+
        \   # Only cache tracks\\n+    cache = {\\n+        key: value\\n+        for
        key, value in cache.items()\\n+        if value is not None and \\\"tracks/\\\"
        in key\\n+    }\\n+\\n+    with open(cache_file_loc, \\\"w\\\", encoding=\\\"utf-8\\\")
        as cache_file:\\n+        json.dump(cache, cache_file)\"},{\"sha\":\"261f2bc0612f93b000c53315e3268ef010cbbd25\",\"filename\":\"spotdl/utils/static.py\",\"status\":\"added\",\"additions\":0,\"deletions\":0,\"changes\":0,\"blob_url\":\"https://github.com/spotDL/spotify-downloader/blob/a3163302c3032e8310dfee4dae5fe2490f0910a4/spotdl%2Futils%2Fstatic.py\",\"raw_url\":\"https://github.com/spotDL/spotify-downloader/raw/a3163302c3032e8310dfee4dae5fe2490f0910a4/spotdl%2Futils%2Fstatic.py\",\"contents_url\":\"https://api.github.com/repos/spotDL/spotify-downloader/contents/spotdl%2Futils%2Fstatic.py?ref=a3163302c3032e8310dfee4dae5fe2490f0910a4\"},{\"sha\":\"1891351bc1c10332e013258c7f2906ad65d21fe6\",\"filename\":\"spotdl/utils/web.py\",\"status\":\"added\",\"additions\":0,\"deletions\":0,\"changes\":0,\"blob_url\":\"https://github.com/spotDL/spotify-downloader/blob/a3163302c3032e8310dfee4dae5fe2490f0910a4/spotdl%2Futils%2Fweb.py\",\"raw_url\":\"https://github.com/spotDL/spotify-downloader/raw/a3163302c3032e8310dfee4dae5fe2490f0910a4/spotdl%2Futils%2Fweb.py\",\"contents_url\":\"https://api.github.com/repos/spotDL/spotify-downloader/contents/spotdl%2Futils%2Fweb.py?ref=a3163302c3032e8310dfee4dae5fe2490f0910a4\"},{\"sha\":\"496560ac65f2fd528b809486e5f3dfb5916836a8\",\"filename\":\"termux/setup_spotdl.sh\",\"status\":\"removed\",\"additions\":0,\"deletions\":0,\"changes\":0,\"blob_url\":\"https://github.com/spotDL/spotify-downloader/blob/597f5dbb72f3082ff8712f38fdfefeb82701c847/termux%2Fsetup_spotdl.sh\",\"raw_url\":\"https://github.com/spotDL/spotify-downloader/raw/597f5dbb72f3082ff8712f38fdfefeb82701c847/termux%2Fsetup_spotdl.sh\",\"contents_url\":\"https://api.github.com/repos/spotDL/spotify-downloader/contents/termux%2Fsetup_spotdl.sh?ref=597f5dbb72f3082ff8712f38fdfefeb82701c847\"},{\"sha\":\"d3ed23c27087caa306915d657223cddf1e0a16e3\",\"filename\":\"termux/termux-url-opener\",\"status\":\"removed\",\"additions\":0,\"deletions\":0,\"changes\":0,\"blob_url\":\"https://g