s://avatars.githubusercontent.com/u/23619946?v=4\",\"gravatar_id\":\"\",\"url\":\"https://api.github.com/users/Silverarmor\",\"html_url\":\"https://github.com/Silverarmor\",\"followers_url\":\"https://api.github.com/users/Silverarmor/followers\",\"following_url\":\"https://api.github.com/users/Silverarmor/following{/other_user}\",\"gists_url\":\"https://api.github.com/users/Silverarmor/gists{/gist_id}\",\"starred_url\":\"https://api.github.com/users/Silverarmor/starred{/owner}{/repo}\",\"subscriptions_url\":\"https://api.github.com/users/Silverarmor/subscriptions\",\"organizations_url\":\"https://api.github.com/users/Silverarmor/orgs\",\"repos_url\":\"https://api.github.com/users/Silverarmor/repos\",\"events_url\":\"https://api.github.com/users/Silverarmor/events{/privacy}\",\"received_events_url\":\"https://api.github.com/users/Silverarmor/received_events\",\"type\":\"User\",\"user_view_type\":\"public\",\"site_admin\":false},\"parents\":[{\"sha\":\"304a2009522ba4c8200dfe30da3ec3ce7cea9766\",\"url\":\"https://api.github.com/repos/spotDL/spotify-downloader/commits/304a2009522ba4c8200dfe30da3ec3ce7cea9766\",\"html_url\":\"https://github.com/spotDL/spotify-downloader/commit/304a2009522ba4c8200dfe30da3ec3ce7cea9766\"}]},{\"sha\":\"bc0db392c1a6066ddc1118407abee66603557fd1\",\"node_id\":\"C_kwDOA71kIdoAKGJjMGRiMzkyYzFhNjA2NmRkYzExMTg0MDdhYmVlNjY2MDM1NTdmZDE\",\"commit\":{\"author\":{\"name\":\"Jayden\",\"email\":\"23619946+Silverarmor@users.noreply.github.com\",\"date\":\"2025-01-16T06:43:02Z\"},\"committer\":{\"name\":\"GitHub\",\"email\":\"noreply@github.com\",\"date\":\"2025-01-16T06:43:02Z\"},\"message\":\"Bump
        jinja2 from 3.1.4 to 3.1.5 (#2268)\\n\\n[//]: # (dependabot-start)\\n\u26A0\uFE0F
        \ **Dependabot is rebasing this PR** \u26A0\uFE0F \\n\\nRebasing might not
        happen immediately, so don't worry if this takes some\\ntime.\\n\\nNote: if
        you make any changes to this PR yourself, they will take\\nprecedence over
        the rebase.\\n\\n---\\n\\n[//]: # (dependabot-end)\\n\\nBumps [jinja2](https://github.com/pallets/jinja)
        from 3.1.4 to 3.1.5.\\n<details>\\n<summary>Release notes</summary>\\n<p><em>Sourced
        from <a\\nhref=\\\"https://github.com/pallets/jinja/releases\\\">jinja2's\\nreleases</a>.</em></p>\\n<blockquote>\\n<h2>3.1.5</h2>\\n<p>This
        is the Jinja 3.1.5 security fix release, which fixes security\\nissues and
        bugs but does not otherwise change behavior and should not\\nresult in breaking
        changes compared to the latest feature release.</p>\\n<p>PyPI: <a\\nhref=\\\"https://pypi.org/project/Jinja2/3.1.5/\\\">https://pypi.org/project/Jinja2/3.1.5/</a>\\nChanges:
        <a\\nhref=\\\"https://jinja.palletsprojects.com/changes/#version-3-1-5\\\">https://jinja.palletsprojects.com/changes/#version-3-1-5</a>\\nMilestone:
        <a\\nhref=\\\"https://github.com/pallets/jinja/milestone/16?closed=1\\\">https://github.com/pallets/jinja/milestone/16?closed=1</a></p>\\n<ul>\\n<li>The
        sandboxed environment handles indirect calls to\\n<code>str.format</code>,
        such as by passing a stored reference to a\\nfilter that calls its argument.
        <a\\nhref=\\\"https://github.com/pallets/jinja/security/advisories/GHSA-q2x7-8rv6-6q7h\\\">GHSA-q2x7-8rv6-6q7h</a></li>\\n<li>Escape
        template name before formatting it into error messages, to\\navoid issues
        with names that contain f-string syntax. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1792\\\">#1792</a>,\\n<a\\nhref=\\\"https://github.com/pallets/jinja/security/advisories/GHSA-gmj6-6f8f-6699\\\">GHSA-gmj6-6f8f-6699</a></li>\\n<li>Sandbox
        does not allow <code>clear</code> and <code>pop</code> on\\nknown mutable
        sequence types. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/2032\\\">#2032</a></li>\\n<li>Calling
        sync <code>render</code> for an async template uses\\n<code>asyncio.run</code>.
        <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1952\\\">#1952</a></li>\\n<li>Avoid
        unclosed <code>auto_aiter</code> warnings. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1960\\\">#1960</a></li>\\n<li>Return
        an <code>aclose</code>-able <code>AsyncGenerator</code> from\\n<code>Template.generate_async</code>.
        <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1960\\\">#1960</a></li>\\n<li>Avoid
        leaving <code>root_render_func()</code> unclosed in\\n<code>Template.generate_async</code>.
        <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1960\\\">#1960</a></li>\\n<li>Avoid
        leaving async generators unclosed in blocks, includes and\\nextends. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1960\\\">#1960</a></li>\\n<li>The
        runtime uses the correct <code>concat</code> function for the\\ncurrent environment
        when calling block references. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1701\\\">#1701</a></li>\\n<li>Make
        <code>|unique</code> async-aware, allowing it to be used after\\nanother async-aware
        filter. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1781\\\">#1781</a></li>\\n<li><code>|int</code>
        filter handles <code>OverflowError</code> from\\nscientific notation. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1921\\\">#1921</a></li>\\n<li>Make
        compiling deterministic for tuple unpacking in a <code>{% set\\n... %}</code>
        call. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/2021\\\">#2021</a></li>\\n<li>Fix
        dunder protocol (<code>copy</code>/<code>pickle</code>/etc)\\ninteraction
        with <code>Undefined</code> objects. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/2025\\\">#2025</a></li>\\n<li>Fix
        <code>copy</code>/<code>pickle</code> support for the internal\\n<code>missing</code>
        object. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/2027\\\">#2027</a></li>\\n<li><code>Environment.overlay(enable_async)</code>
        is applied correctly.\\n<a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/2061\\\">#2061</a></li>\\n<li>The
        error message from <code>FileSystemLoader</code> includes the\\npaths that
        were searched. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1661\\\">#1661</a></li>\\n<li><code>PackageLoader</code>
        shows a clearer error message when the\\npackage does not contain the templates
        directory. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1705\\\">#1705</a></li>\\n<li>Improve
        annotations for methods returning copies. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1880\\\">#1880</a></li>\\n<li><code>urlize</code>
        does not add <code>mailto:</code> to values like\\n<code>@a@b</code>. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1870\\\">#1870</a></li>\\n<li>Tests
        decorated with <code>@pass_context</code> can be used with the\\n<code>|select</code>
        filter. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1624\\\">#1624</a></li>\\n<li>Using
        <code>set</code> for multiple assignment (<code>a, b = 1,\\n2</code>) does
        not fail when the target is a namespace attribute. <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1413\\\">#1413</a></li>\\n<li>Using
        <code>set</code> in all branches of <code>{% if %}{% elif %}{%\\nelse %}</code>
        blocks does not cause the variable to be considered\\ninitially undefined.
        <a\\nhref=\\\"https://redirect.github.com/pallets/jinja/issues/1253\\\">#1253</a></li>\\n</ul>\\n</blockquote>\\n</details>\\n<details>\\n<summary>Changelog</summary>\\n<p><em>Sourced
        from <a\\nhref=\\\"https://github.com/pallets/jinja/blob/main/CHANGES.rst\\\">jinja2's\\nchangelog</a>.</em></p>\\n<blockquote>\\n<h2>Version
        3.1.5</h2>\\n<p>Released 2024-12-21</p>\\n<ul>\\n<li>The sandboxed environment
        handles indirect calls to\\n<code>str.format</code>, such as\\nby passing
        a stored reference to a filter that calls its argument.\\n:ghsa:<code>q2x7-8rv6-6q7h</code></li>\\n<li>Escape
        template name before formatting it into error messages, to\\navoid\\nissues
        with names that contain f-string syntax.\\n:issue:<code>1792</code>, :ghsa:<code>gmj6-6f8f-6699</code></li>\\n<li>Sandbox
        does not allow <code>clear</code> and <code>pop</code> on\\nknown mutable
        sequence\\ntypes. :issue:<code>2032</code></li>\\n<li>Calling sync <code>render</code>
        for an async template uses\\n<code>asyncio.run</code>.\\n:pr:<code>1952</code></li>\\n<li>Avoid
        unclosed <code>auto_aiter</code> warnings.\\n:pr:<code>1960</code></li>\\n<li>Return
        an <code>aclose</code>-able <code>AsyncGenerator</code> from\\n<code>Template.generate_async</code>.
        :pr:<code>1960</code></li>\\n<li>Avoid leaving <code>root_render_func()</code>
        unclosed in\\n<code>Template.generate_async</code>. :pr:<code>1960</code></li>\\n<li>Avoid
        leaving async generators unclosed in blocks, includes and\\nextends.\\n:pr:<code>1960</code></li>\\n<li>The
        runtime uses the correct <code>concat</code> function for the\\ncurrent environment\\nwhen
        calling block references. :issue:<code>1701</code></li>\\n<li>Make <code>|unique</code>
        async-aware, allowing it to be used after\\nanother\\nasync-aware filter.
        :issue:<code>1781</code></li>\\n<li><code>|int</code> filter handles <code>OverflowError</code>
        from\\nscientific notation.\\n:issue:<code>1921</code></li>\\n<li>Make compiling
        deterministic for tuple unpacking in a <code>{% set\\n... %}</code>\\ncall.
        :issue:<code>2021</code></li>\\n<li>Fix dunder protocol (<code>copy</code>/<code>pickle</code>/etc)\\ninteraction
        with <code>Undefined</code>\\nobjects. :issue:<code>2025</code></li>\\n<li>Fix
        <code>copy</code>/<code>pickle</code> support for the internal\\n<code>missing</code>
        object.\\n:issue:<code>2027</code></li>\\n<li><code>Environment.overlay(enable_async)</code>
        is applied correctly.\\n:pr:<code>2061</code></li>\\n<li>The error message
        from <code>FileSystemLoader</code> includes the\\npaths that were\\nsearched.
        :issue:<code>1661</code></li>\\n<li><code>PackageLoader</code> shows a clearer
        error message when the\\npackage does not\\ncontain the templates directory.
        :issue:<code>1705</code></li>\\n<li>Improve annotations for methods returning
        copies.\\n:pr:<code>1880</code></li>\\n<li><code>urlize</code> does not add
        <code>mailto:</code> to values like\\n<code>@a@b</code>. :pr:<code>1870</code></li>\\n<li>Tests
        decorated with <code>@pass_context`` can be used with the\\n``|select`` filter.
        :issue:</code>1624`</li>\\n<li>Using <code>set</code> for multiple assignment
        (<code>a, b = 1,\\n2</code>) does not fail when the\\ntarget is a namespace
        attribute. :issue:<code>1413</code></li>\\n<li>Using <code>set</code> in all
        branches of <code>{% if %}{% elif %}{%\\nelse %}</code> blocks\\ndoes not
        cause the variable to be considered initially undefined.\\n:issue:<code>1253</code></li>\\n</ul>\\n</blockquote>\\n</details>\\n<details>\\n<summary>Commits</summary>\\n<ul>\\n<li><a\\nhref=\\\"https://github.com/pallets/jinja/commit/877f6e51be8e1765b06d911cfaa9033775f051d1\\\"><code>877f6e5</code></a>\\nrelease
        version 3.1.5</li>\\n<li><a\\nhref=\\\"https://github.com/pallets/jinja/commit/8d588592653b052f957b720e1fc93196e06f207f\\\"><code>8d58859</code></a>\\nremove
        test pypi</li>\\n<li><a\\nhref=\\\"https://github.com/pallets/jinja/commit/eda8fe86fd716dfce24910294e9f1fc81fbc740c\\\"><code>eda8fe8</code></a>\\nupdate
