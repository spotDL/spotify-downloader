        passing arguments to yt-dlp.\\n\\nAs mentioned in https://github.com/yt-dlp/yt-dlp/issues/10196,\\n`yt_dlp.parse_options`
        should be used for parsing command line flags.\\n\\nHowever, as this API doesn't
        take in a set of configured options, the\\ndefaults handling is a little bit
        messier. Basically checks for any\\nnon-default values after parsing the command
        line flags, and skips\\nsetting them from the `defaults` dictionary.\\n\\nThis
