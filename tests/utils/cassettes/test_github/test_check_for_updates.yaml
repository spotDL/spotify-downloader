        from 75.8.0 to\\n78.1.1.\\n<details>\\n<summary>Changelog</summary>\\n<p><em>Sourced
        from <a\\nhref=\\\"https://github.com/pypa/setuptools/blob/main/NEWS.rst\\\">setuptools's\\nchangelog</a>.</em></p>\\n<blockquote>\\n<h1>v78.1.1</h1>\\n<h2>Bugfixes</h2>\\n<ul>\\n<li>More
        fully sanitized the filename in PackageIndex._download. (<a\\nhref=\\\"https://redirect.github.com/pypa/setuptools/issues/4946\\\">#4946</a>)</li>\\n</ul>\\n<h1>v78.1.0</h1>\\n<h2>Features</h2>\\n<ul>\\n<li>Restore
        access to _get_vc_env with a warning. (<a\\nhref=\\\"https://redirect.github.com/pypa/setuptools/issues/4874\\\">#4874</a>)</li>\\n</ul>\\n<h1>v78.0.2</h1>\\n<h2>Bugfixes</h2>\\n<ul>\\n<li>Postponed
        removals of deprecated dash-separated and uppercase fields\\nin <code>setup.cfg</code>.\\nAll
        packages with deprecated configurations are advised to move before\\n2026.
        (<a\\nhref=\\\"https://redirect.github.com/pypa/setuptools/issues/4911\\\">#4911</a>)</li>\\n</ul>\\n<h1>v78.0.1</h1>\\n<h2>Misc</h2>\\n<ul>\\n<li><a\\nhref=\\\"https://redirect.github.com/pypa/setuptools/issues/4909\\\">#4909</a></li>\\n</ul>\\n<h1>v78.0.0</h1>\\n<h2>Bugfixes</h2>\\n<ul>\\n<li>Reverted
        distutils changes that broke the monkey patching of command\\nclasses. (<a\\nhref=\\\"https://redirect.github.com/pypa/setuptools/issues/4902\\\">#4902</a>)</li>\\n</ul>\\n<h2>Deprecations
        and Removals</h2>\\n<ul>\\n<li>Setuptools no longer accepts options containing
        uppercase or dash\\ncharacters in <code>setup.cfg</code>.</li>\\n</ul>\\n<!--
